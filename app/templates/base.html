<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}FeedBack SaaS{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            secondary: '#7C3AED',
            danger: '#EF4444',
            success: '#22C55E',
            warning: '#F59E0B',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .sidebar-link { @apply flex items-center gap-3 px-4 py-2 rounded-lg text-sm text-gray-300 hover:bg-indigo-700 hover:text-white transition-all duration-200; }
    .sidebar-link.active { @apply bg-indigo-600 text-white font-semibold; }
    .card { @apply bg-white rounded-2xl shadow-sm border border-gray-100 p-6; }
    .btn-primary { @apply bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-xl transition-all duration-200; }
    .btn-outline { @apply border border-indigo-600 text-indigo-600 hover:bg-indigo-50 font-semibold py-2 px-5 rounded-xl transition-all duration-200; }
    .badge-green  { @apply inline-block bg-green-100 text-green-700 text-xs font-semibold px-2 py-0.5 rounded-full; }
    .badge-yellow { @apply inline-block bg-yellow-100 text-yellow-700 text-xs font-semibold px-2 py-0.5 rounded-full; }
    .badge-red    { @apply inline-block bg-red-100 text-red-700 text-xs font-semibold px-2 py-0.5 rounded-full; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800">
  {% block body %}{% endblock %}
</body>
</html>
